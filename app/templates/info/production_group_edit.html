{% extends "base.html" %}

{% block content %}
<div class="container-fluid">
    <div class="card">
        <div class="card-header">
            <h5 class="mb-0"><i class="bi bi-pencil"></i> Guruhni tahrirlash: {{ group.name }}</h5>
        </div>
        <div class="card-body">
            <form method="POST" action="/info/production-groups/edit/{{ group.id }}">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Guruh nomi *</label>
                        <input type="text" class="form-control" name="name" value="{{ group.name }}" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Operator *</label>
                        <select class="form-select" name="operator_id" required>
                            {% for e in employees %}
                            <option value="{{ e.id }}" {% if e.id == group.operator_id %}selected{% endif %}>{{ e.full_name }} ({{ e.code }})</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Bo'lak narxi (so'm/kg)</label>
                        <select class="form-select" name="piecework_task_id">
                            <option value="">— Tanlang —</option>
                            {% for t in piecework_tasks %}
                            <option value="{{ t.id }}" {% if group.piecework_task_id == t.id %}selected{% endif %}>{{ t.name or t.code }} — {{ "{:,.0f}".format(t.price_per_unit or 0) }} / {{ t.unit_name or 'kg' }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Qiyom kg ga kiritilsin</label>
                        <select class="form-select" name="include_qiyom">
                            <option value="1" {% if group.include_qiyom %}selected{% endif %}>Ha</option>
                            <option value="0" {% if not group.include_qiyom %}selected{% endif %}>Yo'q</option>
                        </select>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Guruh a'zolari</label>
                        <div class="border rounded p-2" style="max-height: 280px; overflow: auto;">
                            {% for e in employees %}
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" name="member_ids" value="{{ e.id }}" id="m_{{ e.id }}" {% if group.members %}{% for m in group.members %}{% if m.id == e.id %}checked{% endif %}{% endfor %}{% endif %}>
                                <label class="form-check-label" for="m_{{ e.id }}">{{ e.full_name }} ({{ e.code }}) — {{ e.position or '—' }}</label>
                            </div>
                            {% endfor %}
                        </div>
                    </div>
                    <div class="col-12">
                        <button type="submit" class="btn btn-success">Saqlash</button>
                        <a href="/info/production-groups" class="btn btn-secondary">Bekor</a>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
