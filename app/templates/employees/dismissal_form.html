{% extends "base.html" %}

{% block content %}
<div class="container-fluid">
    {% if request.query_params.get('error') %}
    <div class="alert alert-danger alert-dismissible fade show py-2 small">
        {{ request.query_params.get('error') }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    {% endif %}
    <div class="card">
        <div class="card-header">
            <h5 class="mb-0"><i class="bi bi-person-x"></i> Ishdan bo'shatish hujjati</h5>
        </div>
        <div class="card-body">
            <p class="text-muted small mb-3">Xodim: <strong>{{ employee.full_name }}</strong> ({{ employee.code }}) — {{ employee.position or '—' }}</p>
            <form method="post" action="/employees/dismissal/create">
                <input type="hidden" name="employee_id" value="{{ employee.id }}">
                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label">Ishdan bo'shatish sanasi <span class="text-danger">*</span></label>
                        <input type="date" class="form-control" name="doc_date" required value="{{ default_date }}">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Sabab</label>
                        <select class="form-select" name="reason">
                            <option value="">— Tanlang —</option>
                            {% for val, label in reasons %}
                            <option value="{{ val }}">{{ label }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-12">
                        <label class="form-label">Izoh (ixtiyoriy)</label>
                        <textarea class="form-control" name="note" rows="2" placeholder="Qo'shimcha izoh"></textarea>
                    </div>
                    <div class="col-12">
                        <button type="submit" class="btn btn-danger"><i class="bi bi-person-x"></i> Hujjat yaratish va ishdan bo'shatish</button>
                        <a href="/employees" class="btn btn-secondary">Bekor</a>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
<script>
(function(){
    var d = new Date().toISOString().slice(0, 10);
    var inp = document.querySelector('input[name="doc_date"]');
    if (inp && !inp.value) inp.value = d;
})();
</script>
{% endblock %}
