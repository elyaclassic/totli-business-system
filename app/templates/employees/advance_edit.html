{% extends "base.html" %}

{% block content %}
<div class="container-fluid">
    {% if request.query_params.get('error') %}
    <div class="alert alert-danger alert-dismissible fade show py-2 small">
        {{ request.query_params.get('error') }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    {% endif %}

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="mb-0"><i class="bi bi-pencil-square"></i> Avansni tahrirlash</h5>
        <a href="/employees/advances" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left"></i> Avanslar ro'yxati</a>
    </div>

    <div class="card">
        <div class="card-header">Avans #{{ advance.id }}</div>
        <div class="card-body">
            <form method="post" action="/employees/advances/edit/{{ advance.id }}" class="row g-3">
                <div class="col-md-3">
                    <label class="form-label small">Xodim *</label>
                    <select name="employee_id" class="form-select form-select-sm select-employee-searchable" required>
                        <option value="">— Xodimni tanlang —</option>
                        {% for e in employees %}
                        <option value="{{ e.id }}" {% if e.id == advance.employee_id %}selected{% endif %}>{{ e.full_name }} ({{ e.code or e.id }})</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label small">Summa (so'm) *</label>
                    <input type="number" name="amount" class="form-control form-control-sm" step="1" min="1" value="{{ advance.amount|int }}" required>
                </div>
                <div class="col-md-2">
                    <label class="form-label small">Sana *</label>
                    <input type="date" name="advance_date" class="form-control form-control-sm" value="{{ advance.advance_date.strftime('%Y-%m-%d') }}" required>
                </div>
                <div class="col-md-3">
                    <label class="form-label small">Izoh</label>
                    <input type="text" name="note" class="form-control form-control-sm" placeholder="Izoh" value="{{ advance.note or '' }}">
                </div>
                <div class="col-12 d-flex gap-2">
                    <button type="submit" class="btn btn-primary btn-sm"><i class="bi bi-check-circle"></i> Saqlash</button>
                    <a href="/employees/advances" class="btn btn-outline-secondary btn-sm">Bekor</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
